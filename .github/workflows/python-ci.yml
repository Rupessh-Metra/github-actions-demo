name: Python CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository
      - uses: actions/checkout@v4

      # Step 2: Install Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install dependencies
      - run: pip install -r requirements.txt

      - run: pwd

      - run: ls -la
      # Step 4: Run tests
      - run: pytest